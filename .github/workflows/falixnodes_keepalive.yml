name: FalixNodes Auto Keep Alive

on:
  workflow_dispatch: # 支持手动触发
  repository_dispatch: # 支持 cron-job.org 通过 API 触发
    types: [trigger-cron]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write   # 需要这个权限才能调用 API 删除旧的 artifacts
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Xvfb and DBus (Ubuntu 24.04)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb dbus-x11

      - name: Install Xray-core
        run: |
          sudo bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install

      - name: Install npm dependencies
        run: |
          npm init -y
          npm install puppeteer puppeteer-real-browser

      - name: Create Xray config parser
        run: |
          cat << 'EOF' > parse_vless.js
          const fs = require('fs');
          const { URL } = require('url');

          const vlessLink = process.env.VLESS_LINK;
          if (!vlessLink) {
              console.error("Error: VLESS_LINK secret is empty or missing!");
              process.exit(1);
          }

          try {
              const myUrl = new URL(vlessLink);
              const uuid = myUrl.username || myUrl.pathname.split('@')[0].replace('//', '');
              const host = myUrl.hostname;
              const port = parseInt(myUrl.port || '443', 10);
              const params = myUrl.searchParams;
              
              const security = params.get('security') || 'tls';
              const network = params.get('type') || 'ws';
              const path = params.get('path') || '/';
              const sni = params.get('sni') || params.get('host') || host;
              
              const config = {
                  log: { loglevel: "warning" },
                  inbounds: [
                      {
                          port: 10808,
                          listen: "127.0.0.1",
                          protocol: "socks",
                          settings: {
                              auth: "noauth",
                              udp: true,
                              ip: "127.0.0.1"
                          }
                      }
                  ],
                  outbounds: [
                      {
                          protocol: "vless",
                          settings: {
                              vnext: [
                                  {
                                      address: host,
                                      port: port,
                                      users: [
                                          {
                                              id: uuid,
                                              encryption: "none"
                                          }
                                      ]
                                  }
                              ]
                          },
                          streamSettings: {
                              network: network,
                              security: security,
                              tlsSettings: {
                                  serverName: sni,
                                  allowInsecure: false
                              },
                              wsSettings: {
                                  path: path,
                                  headers: {
                                      Host: sni
                                  }
                              }
                          }
                      }
                  ]
              };
              
              fs.writeFileSync('xray.json', JSON.stringify(config, null, 2));
              console.log("xray.json has been generated successfully.");
          } catch (e) {
              console.error("Failed to parse VLESS_LINK:", e.message);
              process.exit(1);
          }
          EOF

      - name: Run VLESS Parser
        env:
          VLESS_LINK: ${{ secrets.VLESS_LINK }}
        run: node parse_vless.js

      - name: Start Xray Client Proxy
        run: |
          /usr/local/bin/xray -c xray.json > xray.log 2>&1 &
          sleep 5
          echo "Checking proxy connectivity..."
          curl --socks5-hostname 127.0.0.1:10808 -m 15 https://api.ipify.org && echo "Proxy is working!" || (echo "Proxy check failed!" && cat xray.log && exit 1)

      - name: Create Keep Alive Bot Script
        run: |
          cat << 'EOF' > bot.js
          const { connect } = require('puppeteer-real-browser');
          const fs = require('fs');

          async function sleep(ms) {
              return new Promise(resolve => setTimeout(resolve, ms));
          }

          (async () => {
              console.log("Starting automation script...");
              let response;
              try {
                  response = await connect({
                      headless: 'auto',
                      turnstile: true,
                      args: [
                          "--proxy-server=socks5://127.0.0.1:10808",
                          "--no-sandbox",
                          "--disable-setuid-sandbox",
                          "--disable-dev-shm-usage",
                          "--disable-gpu",
                          "--disable-background-timer-throttling",
                          "--disable-backgrounding-occluded-windows",
                          "--disable-renderer-backgrounding"
                      ]
                  });
              } catch (err) {
                  console.error("Failed to connect to puppeteer-real-browser:", err);
                  process.exit(1);
              }

              const { browser, page } = response;

              // 自动关闭广告弹出的新标签页/新窗口（比如点击后 target="_blank" 跳去广告商网站），
              // 避免这些额外标签页干扰主页面。注意：这里只关闭"新开的标签页"，
              // 不会拦截/屏蔽任何网络请求，不影响网站正常展示广告。
              browser.on('targetcreated', async (target) => {
                  try {
                      if (target.type() === 'page') {
                          const newPage = await target.page();
                          if (newPage && newPage !== page) {
                              console.log('检测到广告弹出新标签页，自动关闭:', target.url());
                              await newPage.close().catch(() => {});
                          }
                      }
                  } catch (e) { /* 忽略关闭失败 */ }
              });

              // 注意：这里特意不拦截/屏蔽任何广告网络请求。
              // 之前试过用 setRequestInterception 屏蔽广告域名和 media 资源，
              // 结果被网站的反广告拦截检测识别到，直接把页面重定向到了
              // "AdBlock Detected" 拦截页，导致后续所有操作全部失败。
              // 这个站点是靠广告支撑免费主机服务的，广告该加载还是让它正常加载。

              // 安全截图工具：带超时保护，就算某次截图卡住/失败也只警告不崩溃。
              // 控制台页面上有很多动态/视频类广告，fullPage 截图容易长时间卡死，
              // 所以这里加了超时兜底（默认不用 fullPage，视口已经够大，
              // 需要的内容本来就在可视区域内）。
              // 注意：这个函数定义在 try 外面，这样 catch 块里出错兜底截图时也能用到它。
              async function safeScreenshot(path, options = {}) {
                  try {
                      await Promise.race([
                          page.screenshot({ path, ...options }),
                          new Promise((_, reject) => setTimeout(() => reject(new Error('screenshot timed out')), 20000))
                      ]);
                  } catch (err) {
                      console.warn(`Screenshot skipped (${path}): ${err.message}`);
                  }
              }

              try {
                  await page.setViewport({ width: 1920, height: 1080 });

                  console.log("Navigating to login page...");
                  await page.goto('https://client.falixnodes.net/auth/login', { waitUntil: 'networkidle2', timeout: 60000 });
                  await sleep(8000);
                  await safeScreenshot('1_login_page.png', { fullPage: true });

                  // 工具函数：向指定输入框安全填值。
                  // 之前用 el.type() 逐字符输入会被页面的重渲染打断，导致输入的字符不断丢失
                  // （日志显示内容是"afno" -> "afnos" -> "afnos8"这样一点点累加，而不是被清空重填）。
                  // 这里改成用原生 input setter 一次性写入整个值，只触发一次 input/change 事件，
                  // 绕开逐字符输入被打断的问题。每次重试都重新获取元素句柄，避免拿到已失效的旧节点。
                  async function safeFill(selector, value, label) {
                      for (let i = 1; i <= 4; i++) {
                          const el = await page.$(selector);
                          if (!el) throw new Error(`Could not find ${label} input (selector: ${selector})`);

                          // 先点击聚焦一下（部分表单依赖 focus 事件触发校验/驱动 Turnstile）
                          await el.click({ clickCount: 3 }).catch(() => {});
                          await sleep(200);

                          await page.evaluate((el, val) => {
                              const proto = el.tagName === 'TEXTAREA'
                                  ? window.HTMLTextAreaElement.prototype
                                  : window.HTMLInputElement.prototype;
                              const nativeSetter = Object.getOwnPropertyDescriptor(proto, 'value').set;
                              // 先清空，再写入，确保不会和旧值拼接
                              nativeSetter.call(el, '');
                              el.dispatchEvent(new Event('input', { bubbles: true }));
                              nativeSetter.call(el, val);
                              el.dispatchEvent(new Event('input', { bubbles: true }));
                              el.dispatchEvent(new Event('change', { bubbles: true }));
                          }, el, value);

                          await sleep(500);
                          // 失焦一下，触发可能存在的 onBlur 校验
                          await page.evaluate(el => el.blur(), el).catch(() => {});
                          await sleep(300);

                          const actualValue = await page.evaluate(el => el.value, el);
                          if (actualValue === value) {
                              console.log(`${label} filled correctly (attempt ${i}).`);
                              return;
                          }
                          console.warn(`${label} mismatch on attempt ${i}: got "${actualValue}" (len ${actualValue.length}), expected length ${value.length}. Retrying...`);
                          await sleep(1000);
                      }
                      throw new Error(`Failed to correctly fill ${label} after retries`);
                  }

                  console.log("Waiting for Turnstile widget to settle before typing...");
                  // 先等待 Turnstile 组件本身出现并完成校验，避免它在你打字过程中重渲染打断输入
                  await page.waitForSelector('input[type="email"], input[autocomplete="username"]', { timeout: 30000 }).catch(() => {});
                  await sleep(10000); // 等待 Turnstile 首次校验稳定下来
                  await safeScreenshot('1b_before_typing.png', { fullPage: true });

                  console.log("Entering credentials...");
                  let emailSelector = 'input[type="email"]';
                  if (!(await page.$(emailSelector))) emailSelector = 'input[autocomplete="username"]';
                  if (!(await page.$(emailSelector))) emailSelector = 'input[placeholder*="email" i]';
                  if (!(await page.$(emailSelector))) emailSelector = 'input';

                  let passwordSelector = 'input[type="password"]';
                  if (!(await page.$(passwordSelector))) passwordSelector = 'input[autocomplete="current-password"]';
                  if (!(await page.$(passwordSelector))) passwordSelector = 'input[placeholder*="password" i]';

                  await safeFill(emailSelector, process.env.FALIX_EMAIL, 'Email');
                  await safeFill(passwordSelector, process.env.FALIX_PASSWORD, 'Password');
                  await safeScreenshot('2_login_filled.png', { fullPage: true });

                  console.log("Waiting a bit more for Turnstile to finalize...");
                  await sleep(5000);
                  await safeScreenshot('2_login_after_turnstile_wait.png', { fullPage: true });

                  console.log("Clicking Sign In...");
                  let signInButton = await page.$('button[type="submit"]');
                  if (!signInButton) {
                      signInButton = await page.evaluateHandle(() => {
                          const buttons = Array.from(document.querySelectorAll('button'));
                          return buttons.find(b => b.innerText.trim() === 'Sign In' || b.innerText.includes('Sign In'));
                      });
                  }

                  if (!signInButton) {
                      throw new Error("Could not find Sign In button");
                  }

                  await signInButton.click();
                  console.log("Clicked Sign In button. Waiting for navigation away from login page...");

                  // 用 URL 变化判断登录是否成功，而不是傻等固定时间
                  let loginSucceeded = false;
                  for (let i = 0; i < 20; i++) { // 最多等 20 * 1.5s = 30s
                      await sleep(1500);
                      const url = page.url();
                      if (!url.includes('/auth/login')) {
                          loginSucceeded = true;
                          break;
                      }
                  }

                  await safeScreenshot('3_after_login.png', { fullPage: true });

                  if (!loginSucceeded) {
                      // 打印页面上的校验错误信息，方便排查（比如账号密码是否正确、Turnstile 是否失败）
                      const pageErrors = await page.evaluate(() => document.body.innerText.slice(0, 2000));
                      console.warn("Still on login page after clicking Sign In. Page text snapshot:\n" + pageErrors);
                      throw new Error("Login did not succeed: URL still contains /auth/login");
                  }
                  console.log("Login succeeded, current URL: " + page.url());

                  console.log("Navigating to Server Console page...");
                  await page.goto('https://client.falixnodes.net/server/2845100/console', { waitUntil: 'networkidle2', timeout: 60000 });
                  console.log("Console page URL after navigation: " + page.url());

                  // 主动等待页面上出现状态关键字，而不是赌一个固定的等待时长。
                  // 如果 20 秒内都没等到，就不再死等，往下走用现有内容做一次状态判断
                  // （用 evaluate 读取 DOM 文字不依赖渲染画面，比截图更可靠）。
                  try {
                      await page.waitForFunction(
                          () => {
                              const t = document.body.innerText;
                              return t.includes('Offline') || t.includes('Running') || t.includes('Online') || t.includes('Starting');
                          },
                          { timeout: 20000 }
                      );
                      console.log("检测到控制台状态文字已加载。");
                  } catch (e) {
                      console.warn("等待状态文字超时（20秒），当前页面可能加载较慢，继续尝试读取现有内容。");
                  }

                  await safeScreenshot('4_console_loaded.png');

                  // 站点会根据出口 IP 地区自动切换中/英文界面，所以下面所有的文字判断
                  // 都同时兼容中文和英文两种说法。
                  const maxRetries = 3;
                  for (let attempt = 1; attempt <= maxRetries; attempt++) {
                      console.log(`Checking container status (Attempt ${attempt}/${maxRetries})... [URL: ${page.url()}]`);

                      const status = await page.evaluate(() => {
                          const bodyText = document.body.innerText;
                          if (bodyText.includes('Offline') || bodyText.includes('离线')) return 'offline';
                          if (bodyText.includes('Running') || bodyText.includes('Online') || bodyText.includes('在线')) return 'online';
                          if (bodyText.includes('Starting') || bodyText.includes('启动中')) return 'starting';
                          return 'unknown';
                      });

                      console.log(`Current container status: ${status}`);
                      if (status === 'unknown') {
                          const snippet = await page.evaluate(() => document.body.innerText.slice(0, 800));
                          console.log("状态未知，页面文字片段（用于排查）：\n" + snippet);
                      }
                      await safeScreenshot(`5_status_check_${attempt}.png`);

                      if (status === 'offline') {
                          console.log("Container is Offline. Attempting to click Start button...");

                          // 用 evaluateHandle 精确定位（只匹配完全等于 "start"/"开机" 的按钮，
                          // 避免 "Restart"/"重启" 之类包含子串或近似文字被误判为同一个按钮）
                          const startHandle = await page.evaluateHandle(() => {
                              const candidates = Array.from(document.querySelectorAll('button, a'));
                              return candidates.find(b => {
                                  const t = b.innerText.trim().toLowerCase();
                                  return t === 'start' || b.innerText.trim() === '开机';
                              }) || null;
                          });
                          const startEl = startHandle.asElement();

                          if (startEl) {
                              await startEl.evaluate(el => el.scrollIntoView({ block: 'center' }));
                              await sleep(300);
                              // 用 Puppeteer 原生的 elementHandle.click()
                              // （通过 CDP 真实模拟鼠标点击，isTrusted=true），
                              // 而不是在页面脚本里调用 el.click()（isTrusted=false，
                              // 很可能被站点的安全校验直接忽略，导致"点了但没反应"）。
                              await startEl.click();
                              console.log("Start button clicked (native mouse click).");

                              // 点击后先等一下，看看会不会弹出"观看广告解锁免费开机"的弹窗
                              // （中文："支持免费托管" / 英文："Support Free Hosting"）。
                              // 注意：这个弹窗不是每次都会出现。
                              await sleep(1500);
                              await safeScreenshot(`5b_right_after_click_${attempt}.png`);

                              const watchAdHandle = await page.evaluateHandle(() => {
                                  const bodyText = document.body.innerText;
                                  const hasAdModal = bodyText.includes('Support Free Hosting') || bodyText.includes('支持免费托管');
                                  if (!hasAdModal) return null;
                                  const isVisible = (el) => {
                                      const rect = el.getBoundingClientRect();
                                      if (rect.width === 0 || rect.height === 0) return false;
                                      const style = window.getComputedStyle(el);
                                      if (style.visibility === 'hidden' || style.display === 'none' || style.pointerEvents === 'none') return false;
                                      return true;
                                  };
                                  const candidates = Array.from(
                                      document.querySelectorAll('button, a, [role="button"], div, span')
                                  ).filter(el => {
                                      if (el.children.length !== 0 || !el.innerText) return false;
                                      const t = el.innerText.trim();
                                      return (t.toLowerCase() === 'watch ad' || t === '观看广告') && isVisible(el);
                                  });
                                  return candidates[0] || null;
                              });
                              const watchAdEl = watchAdHandle.asElement();

                              if (watchAdEl) {
                                  console.log('检测到"观看广告"弹窗，点击"观看广告"...');
                                  await watchAdEl.evaluate(el => el.scrollIntoView({ block: 'center' }));
                                  await sleep(300);
                                  try {
                                      await watchAdEl.click();
                                  } catch (clickErr) {
                                      // 兜底：Puppeteer 判定元素"不可点击"时，直接用坐标模拟鼠标点击
                                      console.warn("watchAdEl.click() 失败，改用坐标点击兜底:", clickErr.message);
                                      const box = await watchAdEl.boundingBox();
                                      if (box) {
                                          await page.mouse.click(box.x + box.width / 2, box.y + box.height / 2);
                                      } else {
                                          console.warn('无法获取"观看广告"按钮坐标，跳过点击。');
                                      }
                                  }
                                  await safeScreenshot(`5c_after_watch_ad_${attempt}.png`);
                                  console.log("等待 20 秒让广告播放...");
                                  await sleep(20000);
                              } else {
                                  console.log("未检测到广告弹窗，等待 30 秒...");
                                  await sleep(30000);
                              }

                              // 刷新页面获取最新的容器状态，避免 SPA 没有实时推送导致
                              // 页面上显示的还是旧状态。刷新后顺便确认一下有没有被带去
                              // 别的页面（比如广告拦截提示页）。
                              console.log("刷新页面以获取最新状态...");
                              try {
                                  await page.reload({ waitUntil: 'networkidle2', timeout: 60000 });
                              } catch (reloadErr) {
                                  console.warn("页面刷新超时/失败，继续用当前页面内容检查状态:", reloadErr.message);
                              }
                              await sleep(2000);

                              const urlAfterReload = page.url();
                              if (!urlAfterReload.includes('/server/2845100/console')) {
                                  console.warn(`刷新后 URL 不是控制台页面（当前: ${urlAfterReload}），尝试导航回控制台...`);
                                  await page.goto('https://client.falixnodes.net/server/2845100/console', { waitUntil: 'networkidle2', timeout: 60000 }).catch(() => {});
                                  await sleep(2000);
                              }
                          } else {
                              console.warn("Could not find Start button on the page!");
                              await safeScreenshot(`error_no_start_btn_${attempt}.png`);
                              await sleep(10000);
                          }
                      } else {
                          console.log(`Container state is [${status}], which is not offline. Stopping task.`);
                          break;
                      }
                  }

                  console.log("Final check...");
                  await safeScreenshot('6_final_status.png');

              } catch (error) {
                  console.error("An error occurred during execution:", error);
                  await safeScreenshot('error_exception.png');
              } finally {
                  console.log("Closing browser...");
                  await browser.close();
              }
          })();
          EOF

      - name: Run Keep Alive Bot
        env:
          FALIX_EMAIL: ${{ secrets.FALIX_EMAIL }}
          FALIX_PASSWORD: ${{ secrets.FALIX_PASSWORD }}
        run: node bot.js

      - name: Upload Debug Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
            xray.log
          retention-days: 7

      - name: Cleanup old artifacts (只保留最近 2 次运行的结果)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 拉取所有 debug-screenshots 工件，按创建时间倒序排列
            const { data } = await github.rest.actions.listArtifactsForRepo({
              owner, repo, per_page: 100
            });
            const debugArtifacts = data.artifacts
              .filter(a => a.name === 'debug-screenshots')
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // 保留最新的 2 个（包括这次刚上传的），其余全部删除
            const toDelete = debugArtifacts.slice(2);
            console.log(`共找到 ${debugArtifacts.length} 个 debug-screenshots 工件，将删除 ${toDelete.length} 个旧的。`);

            for (const artifact of toDelete) {
              console.log(`删除旧工件: id=${artifact.id}, 创建于 ${artifact.created_at}`);
              await github.rest.actions.deleteArtifact({
                owner, repo, artifact_id: artifact.id
              });
            }
